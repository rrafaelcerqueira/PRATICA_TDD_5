<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>{{ acao }} Link - LinkPedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
      color: #333; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 2rem 0;
    }
    
    .glass-card { 
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
      border: 1px solid rgba(255,255,255,0.2);
      padding: 3rem;
      width: 100%;
      max-width: 550px;
    }

    .page-title {
      font-weight: 700;
      color: #0f2027;
      letter-spacing: -0.5px;
    }

    .form-control {
      background-color: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 0.8rem 1.2rem;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
    }

    .form-control:focus {
      background-color: #ffffff;
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
    }

    label {
      font-weight: 600;
      color: #495057;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    form p {
      margin-bottom: 1.5rem;
    }

    .btn-action {
      border-radius: 12px;
      padding: 0.8rem 1.5rem;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container d-flex justify-content-center">
    <div class="glass-card">
      
      <div class="text-center mb-4 pb-3 border-bottom">
        <h3 class="page-title m-0">
          <i class="fas {% if acao == 'Cadastrar' %}fa-plus-circle{% else %}fa-edit{% endif %} text-primary me-2"></i>{{ acao }} Link
        </h3>
        <p class="text-muted small mt-2 mb-0">Preencha os detalhes abaixo para guardar na sua LinkPedia.</p>
      </div>
      
      <form method="POST">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <div class="d-flex justify-content-between mt-5 pt-3 border-top">
          <a href="{% url 'index' %}" class="btn btn-light text-muted btn-action text-decoration-none">
            <i class="fas fa-arrow-left me-2"></i>Cancelar
          </a>
          <button type="submit" class="btn btn-primary btn-action shadow-sm">
            <i class="fas fa-save me-2"></i>Guardar Alterações
          </button>
        </div>
      </form>
      
    </div>
  </div>
</body>
</html>
