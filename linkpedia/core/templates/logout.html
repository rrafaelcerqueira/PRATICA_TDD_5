<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Logout - LinkPedia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #333;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 3.5rem 2.5rem;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    .icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgba(25, 135, 84, 0.1);
      color: #198754;
      margin-bottom: 1.5rem;
    }

    .page-title {
      font-weight: 800;
      color: #0f2027;
      letter-spacing: -0.5px;
    }

    .btn-login {
      border-radius: 12px;
      padding: 0.9rem;
      font-weight: 600;
      font-size: 1.05rem;
      margin-top: 1.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(25, 135, 84, 0.2);
    }
  </style>
</head>

<body>
  <div class="container d-flex justify-content-center">
    <div class="glass-card">
      <div class="icon-wrapper">
        <i class="fas fa-check fa-3x"></i>
      </div>
      <h3 class="page-title mb-2">Sessão Encerrada!</h3>
      <p class="text-muted mb-4">Você saiu do sistema LinkPedia com segurança.</p>
      
      <a href="{% url 'login' %}" class="btn btn-success w-100 btn-login">
        <i class="fas fa-arrow-right-to-bracket me-2"></i>Voltar para o Login
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
