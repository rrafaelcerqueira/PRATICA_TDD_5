<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Excluir Link</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.3); width: 100%; max-width: 500px; background-color: #f8f9fa; color: #343a40; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card p-4 mx-auto border-danger">
      <i class="fas fa-exclamation-triangle text-danger mb-3" style="font-size: 3rem;"></i>
      <h3 class="mb-3">Tem certeza?</h3>
      <p>Deseja realmente apagar o link <strong>"{{ link.titulo }}"</strong>?</p>
      <p class="text-muted small">Esta ação não poderá ser desfeita.</p>
      
      <form method="POST" class="mt-3">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3">
          <a href="{% url 'listar_links' %}" class="btn btn-secondary"><i class="fas fa-arrow-left me-1"></i> Voltar</a>
          <button type="submit" class="btn btn-danger"><i class="fas fa-trash-alt me-1"></i> Sim, Excluir</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
