<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Painel de Controle - LinkPedia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #333;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    .icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 70px;
      height: 70px;
      border-radius: 20px;
      background-color: rgba(13, 110, 253, 0.1);
      color: #0d6efd;
      margin-bottom: 1.5rem;
    }

    .page-title {
      font-weight: 800;
      color: #0f2027;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .action-btn {
      border-radius: 14px;
      padding: 1rem;
      font-size: 1.05rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .action-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .logout-btn {
      border-radius: 12px;
      padding: 0.8rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background-color: #dc3545;
      color: white !important;
      border-color: #dc3545;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="container d-flex justify-content-center">
    <div class="glass-card">
      
      <div class="mb-4">
        <div class="icon-wrapper">
          <i class="fas fa-rocket fa-2x"></i>
        </div>
        <h2 class="page-title">Painel de Ações</h2>
        <p class="text-muted small">Organize e acesse os seus links guardados de forma rápida.</p>
      </div>

      <a href="{% url 'cadastrar_link' %}" class="btn btn-primary action-btn w-100">
        <i class="fas fa-plus-circle fs-5"></i> Cadastrar Novo Link
      </a>

      <a href="{% url 'listar_links' %}" class="btn btn-light action-btn w-100 border text-dark">
        <i class="fas fa-list fs-5 text-secondary"></i> Visualizar Meus Links
      </a>
      
      <form method="POST" action="{% url 'logout' %}" class="mt-4 pt-4 border-top">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-danger w-100 logout-btn">
          <i class="fas fa-sign-out-alt me-2"></i>Sair do Sistema
        </button>
      </form>
      
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
