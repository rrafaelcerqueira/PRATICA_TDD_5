<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Links - LinkPedia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
      color: #333; 
      min-height: 100vh; 
      padding: 3rem 0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .glass-card { 
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
      border: 1px solid rgba(255,255,255,0.2);
      padding: 2.5rem;
    }

    .page-title {
      font-weight: 700;
      color: #0f2027;
      letter-spacing: -0.5px;
    }

    .custom-table {
      border-collapse: separate;
      border-spacing: 0 10px;
      margin-top: -10px;
    }
    
    .custom-table thead th {
      border-bottom: none;
      color: #6c757d;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      padding: 0 1.5rem;
    }

    .custom-table tbody tr {
      background-color: #ffffff;
      box-shadow: 0 4px 6px rgba(0,0,0,0.04);
      transition: all 0.2s ease-in-out;
      border-radius: 12px;
    }

    .custom-table tbody tr:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }

    .custom-table tbody td {
      border: none;
      padding: 1.2rem 1.5rem;
      vertical-align: middle;
    }

    .custom-table tbody td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
    .custom-table tbody td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

    .link-badge {
      background-color: #e9ecef;
      color: #0d6efd;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: background-color 0.2s;
    }

    .link-badge:hover {
      background-color: #0d6efd;
      color: white;
    }

    .btn-action {
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      margin: 0 0.2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glass-card">
      
      <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <h2 class="page-title m-0">
          <i class="fas fa-bookmark text-primary me-2"></i>LinkPedia
        </h2>
        <a href="{% url 'cadastrar_link' %}" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
          <i class="fas fa-plus me-1"></i> Novo Link
        </a>
      </div>
      
      <div class="table-responsive">
        <table class="table custom-table">
          <thead>
            <tr>
              <th>Título</th>
              <th>Link URL</th>
              <th>Observação</th>
              <th class="text-center">Ações</th>
            </tr>
          </thead>
          <tbody>
            {% for link in links %}
            <tr>
              <td class="fw-bold text-dark">{{ link.titulo }}</td>
              <td>
                <a href="{{ link.link }}" target="_blank" class="link-badge">
                  <i class="fas fa-external-link-alt me-1"></i> Acessar
                </a>
              </td>
              <td class="text-muted">{{ link.observacao|default:"Sem observações" }}</td>
              <td class="text-center">
                <a href="{% url 'atualizar_link' link.id %}" class="btn btn-sm btn-outline-warning btn-action border-0" title="Editar">
                  <i class="fas fa-edit fs-5"></i>
                </a>
                <a href="{% url 'remover_link' link.id %}" class="btn btn-sm btn-outline-danger btn-action border-0" title="Excluir">
                  <i class="fas fa-trash-alt fs-5"></i>
                </a>
              </td>
            </tr>
            {% empty %}
            <tr>
              <td colspan="4" class="text-center py-5">
                <i class="fas fa-folder-open text-muted fs-1 mb-3 opacity-50"></i>
                <h5 class="text-muted">Nenhum link cadastrado</h5>
                <p class="text-muted small">Clique em "Novo Link" para começar a salvar.</p>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      
      <div class="mt-4 pt-3 text-start">
        <a href="{% url 'home' %}" class="btn btn-light rounded-pill px-4 text-muted fw-bold">
          <i class="fas fa-arrow-left me-2"></i>Voltar ao Painel
        </a>
      </div>

    </div>
  </div>
</body>
</html>
